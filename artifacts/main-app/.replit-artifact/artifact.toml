kind = "web"
previewPath = "/"
title = "Main App"
version = "1.0.0"
id = "artifacts/main-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21968

[services.development]
run = "pnpm --filter @workspace/main-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/main-app", "run", "build" ]
publicDir = "artifacts/main-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21968"
BASE_PATH = "/"
